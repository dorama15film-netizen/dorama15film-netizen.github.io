<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дорамы от Дианы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            color: #f0f2f5;
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .image-wrapper {
            width: 100%;
            height: 55vh;
            overflow: hidden;
            position: relative;
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }
        .logo-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            cursor: pointer;
        }
        .logo-overlay img {
            height: 50px;
            width: auto;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .search-section {
            width: 100%;
            padding: 15px 20px;
            background: #0b0e14;
            display: flex;
            justify-content: center;
        }
        .search-wrapper {
            width: 92%;
            max-width: 1200px;
            position: relative;
        }
        .search-wrapper input {
            width: 100%;
            padding: 14px 28px;
            background: #000;
            border: 3px solid #ff0000;
            border-radius: 50px;
            color: #f0f2f5;
            font-size: 20px;
            height: 58px;
            padding-right: 140px;
            outline: none;
        }
        .search-wrapper .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff0000;
            border: none;
            color: #fff;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            height: 44px;
        }
        .bottom-section {
            width: 100%;
            padding: 20px 0;
            background: #0b0e14;
            overflow: hidden;
        }
        .marquee-container {
            width: 100%;
            overflow: hidden;
        }
        .marquee {
            display: flex;
            animation: scrollMarquee 80s linear infinite;
            gap: 25px;
            padding-left: 20px;
            width: max-content;
        }
        .marquee-container:hover .marquee {
            animation-play-state: paused;
        }
        .movie-card {
            flex-shrink: 0;
            width: 200px;
            background: #151b24;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a313f;
            cursor: pointer;
        }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }
        .movie-card .title {
            padding: 12px 14px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @keyframes scrollMarquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .site-footer {
            background: #0f141c;
            border-top: 1px solid #1f2631;
            padding: 30px 20px;
            margin-top: auto;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
        }
        .footer-column h4 {
            color: #f0f2f5;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .footer-column p {
            color: #8892a8;
            font-size: 14px;
            line-height: 1.8;
        }
        .footer-column a {
            color: #f1c40f;
            text-decoration: none;
        }
        .footer-column a:hover {
            color: #f39c12;
            text-decoration: underline;
        }
        .footer-column .email-link {
            display: inline-block;
            background: #1e232c;
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #2a313f;
            color: #f1c40f;
            font-size: 15px;
            font-weight: 600;
        }
        .footer-bottom {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 16px;
            border-top: 1px solid #1a212b;
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
        }
        .footer-bottom p {
            color: #3c4557;
            font-size: 13px;
        }
        @media (max-width: 768px) {
            .footer-content {
                grid-template-columns: 1fr;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="image-wrapper">
        <img src="Pr.jpeg" alt="Изображение" />
        <div class="logo-overlay">
            <img src="Logo.jpeg" alt="Логотип" />
        </div>
    </div>

    <div class="search-section">
        <div class="search-wrapper">
            <input type="text" placeholder="Поиск фильмов..." />
            <button class="search-btn">Найти</button>
        </div>
    </div>

    <div class="bottom-section">
        <div class="marquee-container">
            <div class="marquee" id="marquee">
                <div class="movie-card">
                    <img src="DR.jpg" alt="Дорама" />
                    <div class="title">Завтра снова на работу!</div>
                </div>
                <div class="movie-card">
                    <img src="https://st.kp.yandex.net/images/film_iphone/iphone360_447301.jpg" alt="Начало" />
                    <div class="title">Начало</div>
                </div>
                <div class="movie-card">
                    <img src="https://st.kp.yandex.net/images/film_iphone/iphone360_448.jpg" alt="Форрест Гамп" />
                    <div class="title">Форрест Гамп</div>
                </div>
                <div class="movie-card">
                    <img src="https://st.kp.yandex.net/images/film_iphone/iphone360_435.jpg" alt="Зелёная миля" />
                    <div class="title">Зелёная миля</div>
                </div>
                <div class="movie-card">
                    <img src="https://st.kp.yandex.net/images/film_iphone/iphone360_361.jpg" alt="Бойцовский клуб" />
                    <div class="title">Бойцовский клуб</div>
                </div>
                <div class="movie-card">
                    <img src="https://st.kp.yandex.net/images/film_iphone/iphone360_301.jpg" alt="Матрица" />
                    <div class="title">Матрица</div>
                </div>
                <div class="movie-card">
                    <img src="https://st.kp.yandex.net/images/film_iphone/iphone360_312.jpg" alt="Властелин колец" />
                    <div class="title">Властелин колец</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-column">
                <h4>О сайте</h4>
                <p><strong>Дорамы от Дианы</strong> — ваш гид в мире дорам и фильмов.</p>
            </div>
            <div class="footer-column">
                <h4>Информация</h4>
                <p>© 2026 Дорамы от Дианы</p>
            </div>
            <div class="footer-column">
                <h4>Контакты</h4>
                <a href="mailto:dorama15film@gmail.com" class="email-link">✉️ dorama15film@gmail.com</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Дорамы от Дианы</p>
        </div>
    </footer>

    <script>
        // Дублируем карточки для бесконечной анимации
        const marquee = document.getElementById('marquee');
        const cards = marquee.innerHTML;
        marquee.innerHTML = cards + cards;
    </script>

</body>
</html>
