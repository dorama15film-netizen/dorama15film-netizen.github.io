<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дорамы от Дианы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0b0e14;
            overflow-x: hidden;
        }

        .image-wrapper {
            width: 100%;
            height: 55vh;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        .logo-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            cursor: pointer;
            user-select: none;
        }

        .logo-overlay img {
            height: 50px;
            width: auto;
            border-radius: 10px;
            transition: 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .logo-overlay img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
        }

        .genres-wrapper {
            position: absolute;
            top: 20px;
            left: 80px;
            z-index: 9;
            display: flex;
            align-items: center;
            height: 50px;
            overflow: visible;
            max-width: calc(100% - 100px);
        }

        .genres-slide {
            display: flex;
            align-items: center;
            gap: 4px;
            overflow: hidden;
            max-width: 0;
            opacity: 0;
            visibility: hidden;
            transition: max-width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        opacity 0.6s ease,
                        visibility 0.6s ease;
            padding: 0;
            white-space: nowrap;
            height: 44px;
            background: rgba(11, 14, 20, 0.85);
            border-radius: 12px;
            border: 1px solid transparent;
            backdrop-filter: blur(10px);
        }

        .genres-slide.open {
            max-width: 1200px;
            opacity: 1;
            visibility: visible;
            padding: 0 14px;
            border: 1px solid #2a313f;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        .genres-slide .genre-item {
            color: #f1c40f;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            cursor: pointer;
            transition: 0.2s ease;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            border: 2px solid #ff0000;
            background: rgba(0, 0, 0, 0.3);
        }

        .genres-slide .genre-item:hover {
            color: #ffffff;
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff3333;
            transform: scale(1.05);
        }

        .genres-slide .genre-item.active {
            color: #f1c40f;
            background: rgba(255, 0, 0, 0.25);
            border-color: #ff3333;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }

        .genres-slide .genre-item .count {
            color: #ff6666;
            font-size: 11px;
            margin-left: 4px;
        }

        .genres-slide .genre-item.active .count {
            color: #f1c40f;
        }

        .search-section {
            width: 100%;
            padding: 15px 20px 8px 20px;
            background: #0b0e14;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        .search-wrapper {
            width: 92%;
            max-width: 1200px;
            position: relative;
            overflow: hidden;
            border-radius: 50px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 28px;
            background: #000000;
            border: 3px solid #ff0000;
            border-radius: 50px;
            color: #f0f2f5;
            font-size: 20px;
            font-family: system-ui, -apple-system, sans-serif;
            outline: none;
            transition: 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
            height: 58px;
            padding-right: 140px;
        }

        .search-wrapper input::placeholder {
            color: #6a7288;
            font-size: 18px;
        }

        .search-wrapper input:focus {
            border-color: #ff3333;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.25);
            transform: scale(1.01);
        }

        .search-wrapper .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff0000;
            border: none;
            color: #fff;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            font-family: system-ui, -apple-system, sans-serif;
            letter-spacing: 0.5px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            white-space: nowrap;
            transition: right 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55),
                        background 0.5s ease,
                        box-shadow 0.5s ease;
        }

        .search-wrapper .search-btn:hover {
            background: #cc0000;
            transform: translateY(-50%) scale(0.97);
        }

        .search-wrapper .search-btn.animating {
            right: calc(100% - 140px);
            background: #00cc44;
            box-shadow: 0 0 40px rgba(0, 204, 68, 0.4);
        }

        .search-wrapper .search-btn.returning {
            right: 8px;
            background: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
        }

        .bottom-section {
            width: 100%;
            height: calc(45vh - 4px);
            background: #0b0e14;
            display: flex;
            align-items: flex-start;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            padding: 20px 0;
            margin-top: 5px;
        }

        .marquee-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
            padding-top: 10px;
            cursor: grab;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .marquee-container:active {
            cursor: grabbing;
        }

        .marquee-container::-webkit-scrollbar {
            height: 6px;
        }

        .marquee-container::-webkit-scrollbar-track {
            background: #1a212b;
            border-radius: 10px;
        }

        .marquee-container::-webkit-scrollbar-thumb {
            background: #f1c40f;
            border-radius: 10px;
        }

        .marquee-container::-webkit-scrollbar-thumb:hover {
            background: #f39c12;
        }

        .marquee {
            display: flex;
            gap: 25px;
            padding: 0 20px;
            width: max-content;
            margin-top: 5px;
            align-items: flex-start;
        }

        .marquee.hidden {
            display: none;
        }

        .movie-card {
            flex-shrink: 0;
            width: 200px;
            background: #151b24;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a313f;
            transition: 0.3s ease;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .movie-card:hover {
            transform: scale(1.05);
            border-color: #f1c40f;
            box-shadow: 0 12px 40px rgba(241, 196, 15, 0.15);
        }

        .movie-card .poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            display: block;
            background: #1a212b;
        }

        .movie-card .title {
            padding: 12px 14px 14px;
            color: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #151b24;
            border-top: 1px solid #1f2631;
        }

        .movie-card .watch-badge {
            display: inline-block;
            background: #f1c40f;
            color: #0b0e14;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 12px;
            border-radius: 20px;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }

        .search-results-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 10px 20px;
            width: 100%;
        }

        .search-results-grid.active {
            display: grid;
        }

        .no-results {
            display: none;
            text-align: center;
            padding: 40px 20px;
            color: #8892a8;
            font-size: 20px;
            grid-column: 1 / -1;
        }

        .no-results.active {
            display: block;
        }

        .no-results span {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
            padding: 15px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #151b24;
            border-radius: 20px;
            max-width: 420px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid #f1c40f;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            animation: slideUp 0.4s ease;
            position: relative;
        }

        .modal-content::-webkit-scrollbar {
            width: 4px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: #1a212b;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: #f1c40f;
            border-radius: 10px;
        }

        .modal-content .modal-poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            display: block;
            background: #1a212b;
        }

        .modal-content .modal-info {
            padding: 16px 20px 20px;
        }

        .modal-content .modal-title {
            color: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .modal-content .modal-details {
            color: #8892a8;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 6px;
        }

        .modal-content .modal-details strong {
            color: #f0f2f5;
        }

        .modal-content .modal-rating {
            color: #f1c40f;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .modal-content .modal-watch-link {
            display: block;
            width: 100%;
            background: #f1c40f;
            color: #0b0e14;
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            transition: 0.2s;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }

        .modal-content .modal-watch-link:hover {
            background: #f39c12;
            transform: scale(1.02);
        }

        .modal-content .modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #2a313f;
            color: #f0f2f5;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            z-index: 10;
        }

        .modal-content .modal-close:hover {
            background: #c0392b;
            border-color: #c0392b;
            transform: rotate(90deg);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .site-footer {
            width: 100%;
            background: #0f141c;
            border-top: 1px solid #1f2631;
            padding: 30px 20px 20px;
            flex-shrink: 0;
            margin-top: auto;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
        }

        .footer-column h4 {
            color: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .footer-column p {
            color: #8892a8;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.8;
        }

        .footer-column a {
            color: #f1c40f;
            text-decoration: none;
            transition: 0.2s;
        }

        .footer-column a:hover {
            color: #f39c12;
            text-decoration: underline;
        }

        .footer-column .email-link {
            display: inline-block;
            background: #1e232c;
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #2a313f;
            color: #f1c40f;
            font-size: 15px;
            font-weight: 600;
            transition: 0.2s;
            margin-top: 4px;
        }

        .footer-column .email-link:hover {
            background: #2a313f;
            border-color: #f1c40f;
            text-decoration: none;
            transform: scale(1.02);
        }

        .footer-bottom {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 16px;
            border-top: 1px solid #1a212b;
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .footer-bottom p {
            color: #3c4557;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
        }

        .footer-bottom .social-links {
            display: flex;
            gap: 16px;
        }

        .footer-bottom .social-links a {
            color: #3c4557;
            font-size: 18px;
            transition: 0.2s;
            text-decoration: none;
        }

        .footer-bottom .social-links a:hover {
            color: #f1c40f;
        }

        @media (max-width: 768px) {
            .image-wrapper { height: 45vh; }
            .bottom-section { height: calc(55vh - 4px); }
            .movie-card { width: 140px; }
            .movie-card .title { font-size: 12px; padding: 8px 10px; }
            .search-section { padding: 12px 16px 6px 16px; }
            .search-wrapper { width: 94%; }
            .search-wrapper input { height: 50px; font-size: 16px; padding: 12px 20px; padding-right: 120px; }
            .search-wrapper .search-btn { padding: 8px 18px; font-size: 14px; height: 38px; }
            .logo-overlay img { height: 38px; }
            .logo-overlay { top: 12px; left: 12px; }
            .genres-wrapper { top: 12px; left: 60px; height: 38px; max-width: calc(100% - 80px); }
            .genres-slide { height: 36px; gap: 3px; }
            .genres-slide.open { max-width: 70vw; padding: 0 8px; }
            .genres-slide .genre-item { font-size: 11px; padding: 3px 8px; border-width: 1.5px; }
            .genres-slide .genre-item .count { font-size: 9px; margin-left: 2px; }
            .modal-content { max-width: 380px; max-height: 92vh; }
            .modal-content .modal-title { font-size: 18px; }
            .modal-content .modal-info { padding: 14px 16px 16px; }
            .modal-content .modal-details { font-size: 13px; }
            .modal-content .modal-watch-link { font-size: 15px; padding: 10px 20px; }
            .search-results-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 16px;
                padding: 10px 10px;
            }
            .marquee-container::-webkit-scrollbar { height: 4px; }
            .footer-content {
                grid-template-columns: 1fr;
                gap: 20px;
                text-align: center;
            }
            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .movie-card { width: 110px; }
            .movie-card .title { font-size: 10px; padding: 6px 8px; }
            .marquee { gap: 15px; padding: 0 10px; }
            .search-wrapper { width: 96%; }
            .search-wrapper input { font-size: 14px; padding: 10px 16px; height: 44px; padding-right: 100px; }
            .search-wrapper .search-btn { padding: 6px 14px; font-size: 12px; height: 32px; right: 4px; }
            .logo-overlay img { height: 32px; }
            .logo-overlay { top: 8px; left: 8px; }
            .genres-wrapper { top: 8px; left: 48px; height: 32px; max-width: calc(100% - 60px); }
            .genres-slide { height: 30px; gap: 2px; }
            .genres-slide.open { max-width: 55vw; padding: 0 4px; }
            .genres-slide .genre-item { font-size: 9px; padding: 2px 6px; border-width: 1.5px; border-radius: 12px; }
            .genres-slide .genre-item .count { font-size: 8px; margin-left: 1px; }
            .modal-overlay { padding: 10px; }
            .modal-content { max-width: 95%; max-height: 95vh; }
            .modal-content .modal-title { font-size: 16px; }
            .modal-content .modal-info { padding: 12px 14px 14px; }
            .modal-content .modal-close { width: 32px; height: 32px; font-size: 16px; top: 8px; right: 10px; }
            .modal-content .modal-watch-link { font-size: 14px; padding: 10px 16px; }
            .modal-content .modal-details { font-size: 12px; line-height: 1.5; }
            .search-results-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 12px;
                padding: 10px 8px;
            }
            .marquee-container::-webkit-scrollbar { height: 3px; }
            .footer-content {
                grid-template-columns: 1fr;
                gap: 20px;
                text-align: center;
            }
            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

        // ===== ЖАНРЫ =====
        function getAllGenres() {
            const genresSet = new Set();
            movies.forEach(movie => {
                if (movie.genre) {
                    movie.genre.split(',').forEach(g => {
                        const trimmed = g.trim();
                        if (trimmed.toLowerCase() !== 'триллер') {
                            genresSet.add(trimmed);
                        }
                    });
                }
            });
            return Array.from(genresSet).sort();
        }

        function renderGenres() {
            const container = document.getElementById('genresSlide');
            const genres = getAllGenres();
            let html = `<span class="genre-item active" data-genre="all">🎬 Все <span class="count">${movies.length}</span></span>`;
            genres.forEach(genre => {
                const count = movies.filter(m => m.genre && m.genre.includes(genre)).length;
                html += `<span class="genre-item" data-genre="${genre}">${genre} <span class="count">${count}</span></span>`;
            });
            container.innerHTML = html;

            container.querySelectorAll('.genre-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const genre = this.dataset.genre;
                    filterByGenre(genre);
                    container.querySelectorAll('.genre-item').forEach(m => m.classList.remove('active'));
                    this.classList.add('active');
                    closeGenres();
                });
            });
        }

        function toggleGenres() {
            const slide = document.getElementById('genresSlide');
            slide.classList.toggle('open');
        }

        function closeGenres() {
            const slide = document.getElementById('genresSlide');
            slide.classList.remove('open');
        }

        document.getElementById('logoWrapper').addEventListener('click', function(e) {
            e.stopPropagation();
            toggleGenres();
        });

        document.addEventListener('click', function(e) {
            const wrapper = document.getElementById('logoWrapper');
            const slide = document.getElementById('genresSlide');
            if (!wrapper.contains(e.target) && !slide.contains(e.target)) {
                closeGenres();
            }
        });

        let currentGenre = 'all';
        let currentSearchQuery = '';

        function filterByGenre(genre) {
            currentGenre = genre;
            const query = currentSearchQuery;
            let filtered = movies;
            if (genre !== 'all') {
                filtered = filtered.filter(m => m.genre && m.genre.includes(genre));
            }
            if (query.trim()) {
                const lowerQuery = query.toLowerCase().trim();
                filtered = filtered.filter(m => m.name.toLowerCase().includes(lowerQuery));
            }
            if (query.trim() || genre !== 'all') {
                renderSearchResults(filtered);
                document.getElementById('marquee').classList.add('hidden');
            } else {
                resetSearch();
            }
        }

        // ===== КАРУСЕЛЬ (ручная) =====
        function getMarqueeHTML() {
            let html = '';
            movies.forEach(movie => {
                const badge = movie.isSeries ? '<span class="watch-badge">6 серий</span>' : '';
                const isDrama = movie.isDrama ? 'true' : 'false';
                html += `<div class="movie-card" data-movie='${JSON.stringify(movie).replace(/'/g, "&#39;")}'>
                            <img class="poster" src="${movie.poster}" alt="${movie.name}" loading="lazy" />
                            <div class="title">${movie.name} ${badge}</div>
                        </div>`;
            });
            return html;
        }

        function renderSearchResults(filteredMovies) {
            const grid = document.getElementById('searchResultsGrid');
            const noResults = document.getElementById('noResults');
            const marquee = document.getElementById('marquee');
            if (filteredMovies.length === 0) {
                grid.classList.remove('active');
                grid.innerHTML = '';
                noResults.classList.add('active');
                marquee.classList.add('hidden');
                return;
            }
            noResults.classList.remove('active');
            marquee.classList.add('hidden');
            grid.classList.add('active');
            let html = '';
            filteredMovies.forEach(movie => {
                const badge = movie.isSeries ? '<span class="watch-badge">6 серий</span>' : '';
                html += `<div class="movie-card" data-movie='${JSON.stringify(movie).replace(/'/g, "&#39;")}'>
                            <img class="poster" src="${movie.poster}" alt="${movie.name}" loading="lazy" />
                            <div class="title">${movie.name} ${badge}</div>
                        </div>`;
            });
            grid.innerHTML = html;
            attachCardClickHandlers();
        }

        function resetSearch() {
            const grid = document.getElementById('searchResultsGrid');
            const noResults = document.getElementById('noResults');
            const marquee = document.getElementById('marquee');
            grid.classList.remove('active');
            grid.innerHTML = '';
            noResults.classList.remove('active');
            marquee.classList.remove('hidden');
            currentSearchQuery = '';
            document.getElementById('searchInput').value = '';
        }

        document.getElementById('marquee').innerHTML = getMarqueeHTML();
        attachCardClickHandlers();
        renderGenres();

        // ===== ПОДДЕРЖКА ПРОКРУТКИ КОЛЁСИКОМ =====
        const marqueeContainer = document.getElementById('marqueeContainer');
        marqueeContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            marqueeContainer.scrollLeft += e.deltaY;
        });

        // ===== ПОИСК =====
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        let isAnimating = false;

        function performSearch() {
            if (isAnimating) return;

            const query = searchInput.value;
            isAnimating = true;
            currentSearchQuery = query;
            searchBtn.classList.remove('returning');
            searchBtn.classList.add('animating');

            setTimeout(() => {
                let filtered = movies;
                if (query.trim()) {
                    const lowerQuery = query.toLowerCase().trim();
                    filtered = movies.filter(m => m.name.toLowerCase().includes(lowerQuery));
                }
                if (currentGenre !== 'all') {
                    filtered = filtered.filter(m => m.genre && m.genre.includes(currentGenre));
                }

                if (filtered.length === 0) {
                    document.getElementById('marquee').classList.add('hidden');
                    document.getElementById('searchResultsGrid').classList.remove('active');
                    document.getElementById('searchResultsGrid').innerHTML = '';
                    document.getElementById('noResults').classList.add('active');
                } else {
                    document.getElementById('noResults').classList.remove('active');
                    renderSearchResults(filtered);
                }

                searchBtn.classList.remove('animating');
                searchBtn.classList.add('returning');

                setTimeout(() => {
                    searchBtn.classList.remove('returning');
                    isAnimating = false;
                }, 900);
            }, 900);
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                performSearch();
            }
        });

        searchInput.addEventListener('input', function() {
            if (this.value.trim() === '' && currentGenre === 'all') {
                resetSearch();
            } else if (this.value.trim() === '' && currentGenre !== 'all') {
                currentSearchQuery = '';
                filterByGenre(currentGenre);
            }
        });

        // ===== МОДАЛЬНОЕ ОКНО =====
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const modalPoster = document.getElementById('modalPoster');
        const modalTitle = document.getElementById('modalTitle');
        const modalDetails = document.getElementById('modalDetails');
        const modalRating = document.getElementById('modalRating');
        const watchLink = document.getElementById('watchLink');

        function openModal(movie) {
            if (movie.isDrama) {
                modalPoster.src = dramaInfo.poster;
                modalTitle.textContent = dramaInfo.name;
                modalDetails.innerHTML = dramaInfo.details;
                modalRating.textContent = `⭐ ${dramaInfo.rating}`;
                watchLink.style.display = 'block';
                // Передаём ID дорамы в ссылку
                const dramaId = movie.dramaId || 'drama1';
                watchLink.href = `watch.html?drama=${dramaId}`;
            } else {
                modalPoster.src = movie.poster;
                modalTitle.textContent = movie.name;
                modalDetails.innerHTML = `<strong>Год:</strong> ${movie.year || '—'}`;
                modalRating.textContent = `⭐ ${movie.rating || '—'}`;
                watchLink.style.display = 'none';
            }
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        function attachCardClickHandlers() {
            document.querySelectorAll('.movie-card').forEach(card => {
                card.addEventListener('click', function() {
                    const movieData = this.dataset.movie;
                    if (movieData) {
                        try {
                            const movie = JSON.parse(movieData);
                            openModal(movie);
                        } catch (e) {
                            console.error('Ошибка парсинга:', e);
                        }
                    }
                });
            });
        }
    </script>
