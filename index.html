<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дорамы от Дианы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: #0b0e14;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .image-wrapper {
            width: 100%;
            height: 55vh;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        .logo-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            cursor: pointer;
            user-select: none;
        }

        .logo-overlay img {
            height: 50px;
            width: auto;
            border-radius: 10px;
            transition: 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .logo-overlay img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
        }

        .genres-wrapper {
            position: absolute;
            top: 70px;
            left: 20px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            overflow: visible;
            max-width: 90vw;
        }

        .genres-slide {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            max-height: 0;
            opacity: 0;
            visibility: hidden;
            overflow: hidden;
            transition: max-height 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        opacity 0.6s ease,
                        visibility 0.6s ease;
            padding: 0;
            background: rgba(11, 14, 20, 0.92);
            border-radius: 12px;
            border: 1px solid transparent;
            backdrop-filter: blur(10px);
            width: 100%;
        }

        .genres-slide.open {
            max-height: 500px;
            opacity: 1;
            visibility: visible;
            padding: 12px 14px;
            border: 1px solid #2a313f;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
        }

        .genres-slide .genre-item {
            color: #f1c40f;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 14px;
            cursor: pointer;
            transition: 0.2s ease;
            border-radius: 20px;
            white-space: nowrap;
            width: 100%;
            border: 2px solid #ff0000;
            background: rgba(0, 0, 0, 0.3);
            text-align: left;
        }

        .genres-slide .genre-item:hover {
            color: #ffffff;
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff3333;
            transform: scale(1.02);
        }

        .genres-slide .genre-item.active {
            color: #f1c40f;
            background: rgba(255, 0, 0, 0.25);
            border-color: #ff3333;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }

        .genres-slide .genre-item .count {
            color: #ff6666;
            font-size: 11px;
            margin-left: 8px;
        }

        .genres-slide .genre-item.active .count {
            color: #f1c40f;
        }

        /* ===== ВЫПАДАЮЩИЙ ФИЛЬТР ПО ГОДАМ (ПО ЦЕНТРУ ВВЕРХУ) ===== */
        .years-wrapper {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .years-toggle {
            background: rgba(11, 14, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid #2a313f;
            border-radius: 12px;
            color: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 16px;
            font-weight: 700;
            padding: 8px 20px;
            cursor: pointer;
            transition: 0.3s ease;
            user-select: none;
            min-width: 80px;
            text-align: center;
        }

        .years-toggle:hover {
            border-color: #f1c40f;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.1);
        }

        .years-dropdown {
            max-height: 0;
            opacity: 0;
            visibility: hidden;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        opacity 0.3s ease,
                        visibility 0.3s ease;
            background: rgba(11, 14, 20, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid transparent;
            margin-top: 4px;
            width: 100%;
            min-width: 80px;
        }

        .years-dropdown.open {
            max-height: 300px;
            opacity: 1;
            visibility: visible;
            border: 1px solid #2a313f;
            padding: 6px 0;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
        }

        .year-item {
            color: #8892a8;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 20px;
            cursor: pointer;
            transition: 0.2s ease;
            display: block;
            text-align: center;
        }

        .year-item:hover {
            color: #f0f2f5;
            background: rgba(255, 255, 255, 0.05);
        }

        .year-item.active {
            color: #f1c40f;
            background: rgba(241, 196, 15, 0.1);
        }

        /* ===== ПРОДОЛЖИТЬ ПРОСМОТР (ПО ЦЕНТРУ ВЕРТИКАЛИ, СПРАВА) ===== */
        .continue-wrapper {
            position: absolute;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            z-index: 15;
            max-width: 200px;
            width: auto;
            min-width: 140px;
        }

        .continue-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(21, 27, 36, 0.92);
            backdrop-filter: blur(8px);
            border: 2px solid #f1c40f;
            border-radius: 14px;
            padding: 10px 10px 12px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        .continue-card:hover {
            transform: scale(1.05);
            border-color: #f39c12;
            box-shadow: 0 4px 30px rgba(241, 196, 15, 0.25);
        }

        .continue-poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            border-radius: 8px;
            background: #1a212b;
            flex-shrink: 0;
        }

        .continue-info {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 8px;
            text-align: center;
        }

        .continue-name {
            color: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .continue-episode {
            color: #8892a8;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 12px;
        }

        .search-section {
            width: 100%;
            padding: 15px 20px 8px 20px;
            background: #0b0e14;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        .search-wrapper {
            width: 92%;
            max-width: 1200px;
            position: relative;
            overflow: hidden;
            border-radius: 50px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 28px;
            background: #000000;
            border: 3px solid #ff0000;
            border-radius: 50px;
            color: #f0f2f5;
            font-size: 20px;
            font-family: system-ui, -apple-system, sans-serif;
            outline: none;
            transition: 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
            height: 58px;
            padding-right: 140px;
        }

        .search-wrapper input::placeholder {
            color: #6a7288;
            font-size: 18px;
        }

        .search-wrapper input:focus {
            border-color: #ff3333;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.25);
            transform: scale(1.01);
        }

        .search-wrapper .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff0000;
            border: none;
            color: #fff;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            font-family: system-ui, -apple-system, sans-serif;
            letter-spacing: 0.5px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            white-space: nowrap;
            transition: right 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55),
                        background 0.5s ease,
                        box-shadow 0.5s ease;
        }

        .search-wrapper .search-btn:hover {
            background: #cc0000;
            transform: translateY(-50%) scale(0.97);
        }

        .search-wrapper .search-btn.animating {
            right: calc(100% - 140px);
            background: #00cc44;
            box-shadow: 0 0 40px rgba(0, 204, 68, 0.4);
        }

        .search-wrapper .search-btn.returning {
            right: 8px;
            background: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
        }

        /* ===== СЕТКА ФИЛЬМОВ ===== */
        .movies-grid-wrapper {
            width: 100%;
            flex: 1;
            padding: 20px 20px 30px;
            background: #0b0e14;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movies-grid.hidden {
            display: none;
        }

        .movie-card {
            background: #151b24;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a313f;
            transition: 0.3s ease;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .movie-card:hover {
            transform: scale(1.05);
            border-color: #f1c40f;
            box-shadow: 0 12px 40px rgba(241, 196, 15, 0.15);
        }

        .movie-card .poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            display: block;
            background: #1a212b;
        }

        .movie-card .title {
            padding: 12px 14px 14px;
            color: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #151b24;
            border-top: 1px solid #1f2631;
        }

        .no-results {
            display: none;
            text-align: center;
            padding: 40px 20px;
            color: #8892a8;
            font-size: 20px;
        }

        .no-results.active {
            display: block;
        }

        .no-results span {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
            padding: 15px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #151b24;
            border-radius: 20px;
            max-width: 420px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid #f1c40f;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            animation: slideUp 0.4s ease;
            position: relative;
        }

        .modal-content::-webkit-scrollbar {
            width: 4px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: #1a212b;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: #f1c40f;
            border-radius: 10px;
        }

        .modal-content .modal-poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            display: block;
            background: #1a212b;
        }

        .modal-content .modal-info {
            padding: 16px 20px 20px;
        }

        .modal-content .modal-title {
            color: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .modal-content .modal-details {
            color: #8892a8;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 6px;
        }

        .modal-content .modal-details strong {
            color: #f0f2f5;
        }

        .modal-content .modal-rating {
            color: #f1c40f;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .modal-content .modal-watch-link {
            display: block;
            width: 100%;
            background: #f1c40f;
            color: #0b0e14;
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            transition: 0.2s;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }

        .modal-content .modal-watch-link:hover {
            background: #f39c12;
            transform: scale(1.02);
        }

        .modal-content .modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #2a313f;
            color: #f0f2f5;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            z-index: 10;
        }

        .modal-content .modal-close:hover {
            background: #c0392b;
            border-color: #c0392b;
            transform: rotate(90deg);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .site-footer {
            width: 100%;
            background: #0f141c;
            border-top: 1px solid #1f2631;
            padding: 30px 20px 20px;
            flex-shrink: 0;
            margin-top: auto;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
        }

        .footer-column h4 {
            color: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .footer-column p {
            color: #8892a8;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.8;
        }

        .footer-column a {
            color: #f1c40f;
            text-decoration: none;
            transition: 0.2s;
        }

        .footer-column a:hover {
            color: #f39c12;
            text-decoration: underline;
        }

        .footer-column .email-link {
            display: inline-block;
            background: #1e232c;
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #2a313f;
            color: #f1c40f;
            font-size: 15px;
            font-weight: 600;
            transition: 0.2s;
            margin-top: 4px;
        }

        .footer-column .email-link:hover {
            background: #2a313f;
            border-color: #f1c40f;
            text-decoration: none;
            transform: scale(1.02);
        }

        .footer-bottom {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 16px;
            border-top: 1px solid #1a212b;
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .footer-bottom p {
            color: #3c4557;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
        }

        .footer-bottom .social-links {
            display: flex;
            gap: 16px;
        }

        .footer-bottom .social-links a {
            color: #3c4557;
            font-size: 18px;
            transition: 0.2s;
            text-decoration: none;
        }

        .footer-bottom .social-links a:hover {
            color: #f1c40f;
        }

        @media (max-width: 768px) {
            .image-wrapper { height: 45vh; }
            .years-toggle { font-size: 14px; padding: 6px 16px; min-width: 70px; }
            .continue-wrapper { max-width: 150px; min-width: 110px; right: 20px; }
            .continue-name { font-size: 12px; }
            .continue-episode { font-size: 10px; }
            .continue-card { padding: 8px 8px 10px; border-radius: 12px; }
            .movies-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
            .movies-grid-wrapper { padding: 12px 12px 20px; }
            .movie-card .title { font-size: 12px; padding: 8px 10px; }
            .search-section { padding: 12px 16px 6px 16px; }
            .search-wrapper { width: 94%; }
            .search-wrapper input { height: 50px; font-size: 16px; padding: 12px 20px; padding-right: 120px; }
            .search-wrapper .search-btn { padding: 8px 18px; font-size: 14px; height: 38px; }
            .logo-overlay img { height: 38px; }
            .logo-overlay { top: 12px; left: 12px; }
            .genres-wrapper { top: 60px; left: 12px; }
            .genres-slide .genre-item { font-size: 13px; padding: 5px 12px; }
            .modal-content { max-width: 380px; max-height: 92vh; }
            .modal-content .modal-title { font-size: 18px; }
            .modal-content .modal-info { padding: 14px 16px 16px; }
            .modal-content .modal-details { font-size: 13px; }
            .modal-content .modal-watch-link { font-size: 15px; padding: 10px 20px; }
            .footer-content {
                grid-template-columns: 1fr;
                gap: 20px;
                text-align: center;
            }
            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .image-wrapper { height: 40vh; }
            .years-wrapper { top: 10px; }
            .years-toggle { font-size: 12px; padding: 4px 12px; min-width: 60px; }
            .years-dropdown.open { padding: 4px 0; }
            .year-item { font-size: 12px; padding: 4px 14px; }
            .continue-wrapper { right: 10px; max-width: 110px; min-width: 80px; }
            .continue-name { font-size: 10px; }
            .continue-episode { font-size: 8px; }
            .continue-card { padding: 5px 5px 7px; border-radius: 10px; border-width: 1.5px; }
            .movies-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
            .movies-grid-wrapper { padding: 10px 8px 16px; }
            .movie-card .title { font-size: 10px; padding: 6px 8px; }
            .search-wrapper { width: 96%; }
            .search-wrapper input { font-size: 14px; padding: 10px 16px; height: 44px; padding-right: 100px; }
            .search-wrapper .search-btn { padding: 6px 14px; font-size: 12px; height: 32px; right: 4px; }
            .logo-overlay img { height: 32px; }
            .logo-overlay { top: 8px; left: 8px; }
            .genres-wrapper { top: 48px; left: 8px; max-width: 92vw; }
            .genres-slide.open { padding: 10px 10px; }
            .genres-slide .genre-item { font-size: 12px; padding: 4px 10px; border-width: 1.5px; }
            .genres-slide .genre-item .count { font-size: 10px; margin-left: 4px; }
            .modal-overlay { padding: 10px; }
            .modal-content { max-width: 95%; max-height: 95vh; }
            .modal-content .modal-title { font-size: 16px; }
            .modal-content .modal-info { padding: 12px 14px 14px; }
            .modal-content .modal-close { width: 32px; height: 32px; font-size: 16px; top: 8px; right: 10px; }
            .modal-content .modal-watch-link { font-size: 14px; padding: 10px 16px; }
            .modal-content .modal-details { font-size: 12px; line-height: 1.5; }
            .footer-content {
                grid-template-columns: 1fr;
                gap: 20px;
                text-align: center;
            }
            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="image-wrapper">
        <img src="Pr.jpeg" alt="Изображение" />

        <!-- ===== ЛОГОТИП (СЛЕВА) ===== -->
        <div class="logo-overlay" id="logoWrapper">
            <img src="Logo.jpeg" alt="Логотип" />
            <div class="genres-wrapper">
                <div class="genres-slide" id="genresSlide"></div>
            </div>
        </div>

        <!-- ===== ФИЛЬТР ПО ГОДАМ (ПО ЦЕНТРУ) ===== -->
        <div class="years-wrapper" id="yearsWrapper">
            <div class="years-toggle" id="yearsToggle"> Поиск по годам</div>
            <div class="years-dropdown" id="yearsDropdown"></div>
        </div>

        <!-- ===== ПРОДОЛЖИТЬ ПРОСМОТР (ПО ЦЕНТРУ ВЕРТИКАЛИ, СПРАВА) ===== -->
        <div class="continue-wrapper" id="continueWrapper">
            <div class="continue-card" id="continueCard">
                <img class="continue-poster" id="continuePoster" src="" alt="Постер" />
                <div class="continue-info">
                    <div class="continue-name" id="continueName">Название дорамы</div>
                    <div class="continue-episode" id="continueEpisode">Серия 1</div>
                </div>
            </div>
        </div>
    </div>

    <div class="search-section">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Поиск фильмов..." autocomplete="off" />
            <button class="search-btn" id="searchBtn">Найти</button>
        </div>
    </div>

    <!-- ===== СЕТКА С ФИЛЬМАМИ ===== -->

        // ===== ЖАНРЫ =====
        function getAllGenres() {
            const genresSet = new Set();
            movies.forEach(movie => {
                if (movie.genre) {
                    movie.genre.split(',').forEach(g => {
                        const trimmed = g.trim();
                        if (trimmed.toLowerCase() !== 'триллер') {
                            genresSet.add(trimmed);
                        }
                    });
                }
            });
            return Array.from(genresSet).sort();
        }

        function renderGenres() {
            const container = document.getElementById('genresSlide');
            const genres = getAllGenres();
            let html = `<span class="genre-item active" data-genre="all"> Все <span class="count">${movies.length}</span></span>`;
            genres.forEach(genre => {
                const count = movies.filter(m => m.genre && m.genre.includes(genre)).length;
                html += `<span class="genre-item" data-genre="${genre}">${genre} <span class="count">${count}</span></span>`;
            });
            container.innerHTML = html;

            container.querySelectorAll('.genre-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const genre = this.dataset.genre;
                    filterByGenre(genre);
                    container.querySelectorAll('.genre-item').forEach(m => m.classList.remove('active'));
                    this.classList.add('active');
                    closeGenres();
                });
            });
        }

            const slide = document.getElementById('genresSlide');
            slide.classList.toggle('open');
        }

            slide.classList.remove('open');
        }

                closeGenres();
            }
        });

                    yearsSet.add(movie.year);

            });
            
            const years = Array.from(yearsSet).sort((a, b) => b - a);
            
            let html = '';
            years.forEach(year => {
                html += `<span class="year-item" data-year="${year}">${year}</span>`;
            });
            container.innerHTML = html;

            container.querySelectorAll('.year-item').forEach(item => {

        function applyFilters() {
            const query = currentSearchQuery;
            let filtered = movies;
            
            if (currentGenre !== 'all') {
                filtered = filtered.filter(m => m.genre && m.genre.includes(currentGenre));
            }
            
            if (currentYear !== 'all') {
                filtered = filtered.filter(m => m.year === parseInt(currentYear));
            }
            
            if (query.trim()) {
                const lowerQuery = query.toLowerCase().trim();
                filtered = filtered.filter(m => m.name.toLowerCase().includes(lowerQuery));
            }
            
            // Обновляем сетку
            const grid = document.getElementById('moviesGrid');
            const noResults = document.getElementById('noResults');
            
            if (filtered.length === 0) {
                grid.innerHTML = '';
                grid.classList.add('hidden');
                noResults.classList.add('active');
                return;
            }
            
            noResults.classList.remove('active');
            grid.classList.remove('hidden');
            
            let html = '';
            filtered.forEach(movie => {
                html += `<div class="movie-card" data-movie='${JSON.stringify(movie).replace(/'/g, "&#39;")}'>
                            <img class="poster" src="${movie.poster}" alt="${movie.name}" loading="lazy" />
                            <div class="title">${movie.name}</div>
                        </div>`;
            });
            grid.innerHTML = html;
            attachCardClickHandlers();
        }

        function filterByGenre(genre) {
            currentGenre = genre;

        function resetSearch() {
            const grid = document.getElementById('moviesGrid');
            const noResults = document.getElementById('noResults');
            grid.classList.remove('hidden');
            noResults.classList.remove('active');

        function performSearch() {
            if (isAnimating) return;

            const query = searchInput.value;
            isAnimating = true;
            currentSearchQuery = query;
            searchBtn.classList.remove('returning');
            searchBtn.classList.add('animating');

            setTimeout(() => {
                applyFilters();

                searchBtn.classList.remove('animating');
                searchBtn.classList.add('returning');

                setTimeout(() => {
                    searchBtn.classList.remove('returning');
                    isAnimating = false;
                }, 900);
            }, 900);
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {

        });

            if (e.key === 'Escape') closeModal();
        });

        function attachCardClickHandlers() {
            document.querySelectorAll('.movie-card').forEach(card => {
                card.addEventListener('click', function() {
                    const movieData = this.dataset.movie;
                    if (movieData) {
                        try {
                            const movie = JSON.parse(movieData);
                            openModal(movie);
                        } catch (e) {
                            console.error('Ошибка парсинга:', e);
                        }
                    }
                });
            });

        // ===== ПРОДОЛЖИТЬ ПРОСМОТР =====
        function getLastWatchedDrama() {
            const savedDramaId = localStorage.getItem('lastDramaId');
            if (savedDramaId && DRAMAS[savedDramaId]) {
                return savedDramaId;
            }
            return 'drama1';
        }

        function getLastEpisode(dramaId) {
            const storageKey = DRAMAS[dramaId]?.storageKey;
            if (storageKey) {
                const saved = localStorage.getItem(storageKey);
                if (saved) return parseInt(saved);
            }
            return 1;
        }

        function renderContinueWatching() {
            const dramaId = getLastWatchedDrama();
            const drama = DRAMAS[dramaId];
            if (!drama) return;

            const episode = getLastEpisode(dramaId);
            const poster = drama.poster || 'DR.jpg';

            document.getElementById('continuePoster').src = poster;
            document.getElementById('continueName').textContent = drama.name;
            document.getElementById('continueEpisode').textContent = `Серия ${episode}`;

            const card = document.getElementById('continueCard');
            card.addEventListener('click', function() {
                window.location.href = `watch.html?drama=${dramaId}`;
            });
        }

        // Запускаем после загрузки страницы
        document.addEventListener('DOMContentLoaded', renderContinueWatching);
