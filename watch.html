<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смотреть дораму</title>
    <link rel="icon" href="Log.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0b0e14;
            --bg-secondary: #151b24;
            --bg-card: #151b24;
            --bg-header: #0f141c;
            --text-primary: #f0f2f5;
            --text-secondary: #8892a8;
            --text-muted: #6a7288;
            --border-color: #1f2631;
            --border-light: #2a313f;
            --shadow: rgba(0, 0, 0, 0.5);
            --shadow-glow: rgba(241, 196, 15, 0.15);
            --input-bg: #000000;
            --toast-bg: #151b24;
            --modal-bg: #151b24;
            --scrollbar-track: #1a212b;
            --scrollbar-thumb: #f1c40f;
            --accent-color: #f1c40f;
            --accent-hover: #f39c12;
        }

        [data-theme="light"] {
            --bg-primary: #e8f4f8;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-header: #d4ecf5;
            --text-primary: #1a2a3a;
            --text-secondary: #3a5a6a;
            --text-muted: #5a7a8a;
            --border-color: #b0d4e0;
            --border-light: #90c4d4;
            --shadow: rgba(0, 180, 200, 0.15);
            --shadow-glow: rgba(0, 212, 255, 0.25);
            --input-bg: #f0f8fa;
            --toast-bg: #ffffff;
            --modal-bg: #ffffff;
            --scrollbar-track: #d4ecf5;
            --scrollbar-thumb: #00bcd4;
            --accent-color: #00bcd4;
            --accent-hover: #0097a7;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .header {
            padding: 16px 30px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .header .back-btn {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            padding: 10px 24px;
            background: #1a4d2e;
            border: 2px solid var(--accent-color);
            border-radius: 30px;
            transition: 0.3s ease;
            display: inline-block;
        }

        .header .back-btn:hover {
            background: #2a6d3e;
            border-color: var(--accent-hover);
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--shadow-glow);
        }

        .header .title {
            font-size: 22px;
            font-weight: 700;
            color: #1a4d2e;
            text-shadow:
                0 0 10px rgba(241, 196, 15, 0.5),
                0 0 20px rgba(241, 196, 15, 0.3),
                0 0 40px rgba(241, 196, 15, 0.1);
            -webkit-text-stroke: 1px var(--accent-color);
            text-stroke: 1px var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: text-shadow 0.3s ease, -webkit-text-stroke 0.3s ease;
        }

        .header .title span {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 16px;
            margin-left: 10px;
            transition: color 0.3s ease;
        }

        /* ===== ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ ===== */
        .theme-toggle-wrapper {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle-label {
            color: var(--text-secondary);
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .theme-switch {
            position: relative;
            width: 56px;
            height: 30px;
            background: #2a313f;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s ease;
            border: 2px solid #3a4555;
            flex-shrink: 0;
        }

        [data-theme="light"] .theme-switch {
            background: #00bcd4;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .theme-switch .slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 22px;
            height: 22px;
            background: #8892a8;
            border-radius: 50%;
            transition: 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] .theme-switch .slider {
            left: 28px;
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0, 212, 255, 0.4);
        }

        .theme-switch:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .theme-switch .theme-icons {
            display: flex;
            justify-content: space-between;
            padding: 0 6px;
            align-items: center;
            height: 100%;
            font-size: 14px;
            color: #6a7288;
            pointer-events: none;
        }

        [data-theme="light"] .theme-icons .sun-icon { color: #ffffff; }
        [data-theme="dark"] .theme-icons .moon-icon { color: #f1c40f; }

        .main-content {
            flex: 1;
            padding: 20px 30px 30px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
            aspect-ratio: 16 / 9;
            transition: border-color 0.3s ease;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .episode-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .episode-info .current-episode {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-color);
            transition: color 0.3s ease;
        }

        .episode-info .episode-title {
            color: var(--text-secondary);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .episodes-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 10px 0 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .episodes-list .episode-btn {
            background: var(--bg-secondary);
            border: 2px solid var(--border-light);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: 0.25s ease;
        }

        .episodes-list .episode-btn:hover {
            border-color: var(--accent-color);
            color: var(--text-primary);
        }

        .episodes-list .episode-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: #0b0e14;
        }

        .drama-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 10px;
        }

        .drama-description {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.8;
            transition: color 0.3s ease;
        }

        .drama-description .info-item {
            display: flex;
            gap: 10px;
            margin-bottom: 6px;
        }

        .drama-description .info-item .label {
            color: var(--text-muted);
            min-width: 120px;
            flex-shrink: 0;
            transition: color 0.3s ease;
        }

        .drama-description .info-item .value {
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        .drama-description .plot {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.8;
            margin-top: 8px;
            transition: color 0.3s ease;
        }

        .drama-description .plot strong {
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        .cast-section .cast-title {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            transition: color 0.3s ease;
        }

        .cast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .cast-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .cast-item .actor-name {
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .cast-item .actor-role {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 2px;
            transition: color 0.3s ease;
        }

        .cast-item .actor-role-tag {
            background: #1e232c;
            color: var(--accent-color);
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
            transition: color 0.3s ease;
        }

        /* ===== КОММЕНТАРИИ ===== */
        .comments-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            width: 100%;
            transition: border-color 0.3s ease;
        }

        .comments-section .comments-title {
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s ease;
        }

        .comments-section .comments-title span {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        .comment-form {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .comment-form input {
            flex: 1;
            min-width: 200px;
            padding: 12px 18px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-light);
            border-radius: 30px;
            color: var(--text-primary);
            font-family: system-ui, sans-serif;
            font-size: 14px;
            outline: none;
            transition: 0.3s ease;
        }

        .comment-form input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 30px var(--shadow-glow);
        }

        .comment-form input::placeholder {
            color: var(--text-muted);
        }

        .comment-form textarea {
            flex: 2;
            min-width: 300px;
            padding: 12px 18px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-light);
            border-radius: 16px;
            color: var(--text-primary);
            font-family: system-ui, sans-serif;
            font-size: 14px;
            outline: none;
            resize: vertical;
            min-height: 60px;
            transition: 0.3s ease;
        }

        .comment-form textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 30px var(--shadow-glow);
        }

        .comment-form .submit-btn {
            background: #1a4d2e;
            border: 2px solid var(--accent-color);
            border-radius: 30px;
            color: var(--text-primary);
            padding: 12px 28px;
            font-family: system-ui, sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            white-space: nowrap;
        }

        .comment-form .submit-btn:hover {
            background: #2a6d3e;
            border-color: var(--accent-hover);
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--shadow-glow);
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .comments-list::-webkit-scrollbar {
            width: 4px;
        }
        .comments-list::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 10px;
        }
        .comments-list::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
        }

        .comment-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 18px;
            animation: fadeInUp 0.3s ease;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .comment-item .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .comment-item .comment-author {
            color: var(--accent-color);
            font-weight: 600;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        .comment-item .comment-date {
            color: var(--text-muted);
            font-size: 12px;
            transition: color 0.3s ease;
        }

        .comment-item .comment-text {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            transition: color 0.3s ease;
        }

        .comment-item .comment-delete {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s ease;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .comment-item .comment-delete:hover {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .no-comments {
            color: var(--text-muted);
            text-align: center;
            padding: 20px;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 100px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
        }

        .toast {
            background: var(--toast-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 14px 20px;
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            box-shadow: 0 8px 30px var(--shadow);
            animation: slideInRight 0.4s ease, fadeOut 0.4s ease 2.6s forwards;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .toast.success {
            border-color: #2ecc71;
        }

        .toast.error {
            border-color: #e74c3c;
        }

        .toast.info {
            border-color: var(--accent-color);
        }

        .toast .toast-icon {
            font-size: 20px;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(50px); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .header .title { font-size: 18px; }
            .theme-toggle-wrapper { gap: 6px; }
            .theme-switch { width: 48px; height: 26px; }
            .theme-switch .slider { width: 18px; height: 18px; }
            [data-theme="light"] .theme-switch .slider { left: 24px; }
            .theme-toggle-label { font-size: 11px; }
            .main-content { padding: 12px 16px 20px; }
            .drama-info { grid-template-columns: 1fr; gap: 20px; }
            .cast-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .drama-description .info-item .label { min-width: 90px; }
            .comment-form { flex-direction: column; }
            .comment-form input { min-width: auto; }
            .comment-form textarea { min-width: auto; min-height: 50px; }
        }

        @media (max-width: 480px) {
            .header .title { font-size: 15px; }
            .header .title span { font-size: 13px; display: block; margin-left: 0; }
            .theme-toggle-wrapper { gap: 4px; }
            .theme-switch { width: 42px; height: 22px; }
            .theme-switch .slider { width: 16px; height: 16px; top: 1px; left: 1px; }
            [data-theme="light"] .theme-switch .slider { left: 22px; }
            .theme-toggle-label { font-size: 10px; }
            .theme-switch .theme-icons { font-size: 11px; padding: 0 4px; }
            .cast-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .cast-item { padding: 10px 12px; }
            .drama-description .info-item { flex-direction: column; gap: 2px; }
            .drama-description .info-item .label { min-width: auto; }
            .drama-description .plot { font-size: 13px; }
            .comments-section .comments-title { font-size: 17px; }
            .comment-item .comment-author { font-size: 13px; }
            .comment-item .comment-text { font-size: 13px; }
            .toast-container { bottom: 70px; right: 10px; max-width: 240px; }
            .toast { font-size: 12px; padding: 10px 14px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="back-btn"> На главную</a>
        <div class="title"> <span id="dramaTitle">Завтра снова на работу!</span> <span id="dramaEpisodes">6 серий</span></div>

        <!-- ===== ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ ===== -->
        <div class="theme-toggle-wrapper">
            <span class="theme-toggle-label" id="themeLabel">Тема</span>
            <div class="theme-switch" id="themeSwitch">
                <div class="slider"></div>
                <div class="theme-icons">
                    <span class="moon-icon">🌙</span>
                    <span class="sun-icon">☀️</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="player-wrapper">
            <iframe id="videoPlayer" src="" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="episode-info">
            <div>
                <span class="current-episode" id="currentEpisode">Серия 1</span>
                <span class="episode-title" id="episodeTitle"> Начало истории</span>
            </div>
        </div>

        <div class="episodes-list" id="episodesList"></div>

        <div class="drama-info" id="dramaInfo"></div>

        <!-- ===== КОММЕНТАРИИ ===== -->
        <div class="comments-section" id="commentsSection">
            <div class="comments-title">
                💬 Комментарии <span id="commentsCount">(0)</span>
            </div>

            <div class="comment-form">
                <input type="text" id="commentName" placeholder="Ваше имя..." maxlength="30" />
                <textarea id="commentText" placeholder="Напишите комментарий..." maxlength="500"></textarea>
                <button class="submit-btn" id="submitComment">Отправить</button>
            </div>

            <div class="comments-list" id="commentsList">
                <div class="no-comments">Пока нет комментариев. Будьте первым! 🎬</div>
            </div>
        </div>
    </main>

    <script>
        // =====================================================
        // ===== ТЕМА (СЛАЙДЕР) =====
        // =====================================================
        const themeSwitch = document.getElementById('themeSwitch');
        let currentTheme = localStorage.getItem('theme') || 'dark';

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            currentTheme = theme;
        }

        themeSwitch.addEventListener('click', () => {
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
            showToast(newTheme === 'light' ? '☀️ Светлая тема' : '🌙 Тёмная тема', '🎨', 'info');
        });

        applyTheme(currentTheme);

        // =====================================================
        // ===== ДАННЫЕ О ДОРАМАХ =====
        // =====================================================
        function showToast(message, icon = '📢', type = 'info') {
            const container = document.getElementById('toastContainer') || createToastContainer();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="toast-icon">${icon}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, 3000);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.className = 'toast-container';
            container.id = 'toastContainer';
            document.body.appendChild(container);
            return container;
        }

        const DRAMAS = {
            drama1: {
                name: 'Завтра снова на работу!',
                episodes: 6,
                storageKey: 'lastDramaEpisode1',
                info: {
                    year: '2024',
                    director: 'Чо Ын-соль',
                    genre: 'мелодрама, комедия',
                    country: 'Республика Корея',
                    duration: '—',
                    translation: '—',
                    plot: 'Увлекательная история о жизни и любви.',
                    cast: [
                        { name: 'Со Ин Гук', role: 'Кан Си У', tag: 'Главная роль' },
                        { name: 'Пак Джи Хён', role: 'Ча Джи Юн', tag: 'Главная роль' },
                        { name: 'Кан Ми На', role: 'Юн Но А', tag: '' },
                        { name: 'Чхве Гён Хун', role: 'Чо Га Ыль', tag: '' },
                        { name: 'Вон Гю Бин', role: 'Ли Чжэ Ин', tag: '' },
                        { name: 'Пак Е Ён', role: 'Чхве Су Джин', tag: '' }
                    ]
                },
                videos: {
                    1: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239017&hash=840fe3708e6631e2&hd=3',
                    2: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239018&hash=beca558dabab47be&hd=3',

        // =====================================================
        // ===== ОПРЕДЕЛЯЕМ КАКУЮ ДОРАМУ ПОКАЗЫВАТЬ =====
        // =====================================================
        const urlParams = new URLSearchParams(window.location.search);
        let dramaId = urlParams.get('drama') || 'drama1';

        if (!urlParams.has('drama')) {
            const saved = localStorage.getItem('lastDramaId');
            if (saved && DRAMAS[saved]) {
                dramaId = saved;
            }
        }

        const drama = DRAMAS[dramaId];
        if (!drama) {
            window.location.href = 'index.html';
            throw new Error('Дорама не найдена');
        }

        localStorage.setItem('lastDramaId', dramaId);

        // =====================================================
        // ===== ЗАГРУЗКА ДОРАМЫ =====
        // =====================================================
        const episodes = [];
        for (let i = 1; i <= drama.episodes; i++) {
            episodes.push({ number: i, title: '' });
        }

        const episodesList = document.getElementById('episodesList');
        const videoPlayer = document.getElementById('videoPlayer');
        const currentEpisodeSpan = document.getElementById('currentEpisode');
        const episodeTitleSpan = document.getElementById('episodeTitle');
        const dramaTitle = document.getElementById('dramaTitle');
        const dramaEpisodes = document.getElementById('dramaEpisodes');
        const dramaInfoDiv = document.getElementById('dramaInfo');

        let currentEpisode = 1;

        function renderInfo() {
            const info = drama.info;
            dramaTitle.textContent = drama.name;
            dramaEpisodes.textContent = `${drama.episodes} серий`;

            let castHtml = '';
            info.cast.forEach(actor => {
                const tag = actor.tag ? `<span class="actor-role-tag">${actor.tag}</span>` : '';
                castHtml += `
                    <div class="cast-item">
                        <div class="actor-name">${actor.name}</div>
                        <div class="actor-role">${actor.role}</div>
                        ${tag}
                    </div>
                `;
            });

            dramaInfoDiv.innerHTML = `
                <div class="drama-description">
                    <div class="info-item"><span class="label"> Год выпуска:</span><span class="value">${info.year}</span></div>
                    <div class="info-item"><span class="label"> Режиссёр:</span><span class="value">${info.director}</span></div>
                    <div class="info-item"><span class="label"> Жанр:</span><span class="value">${info.genre}</span></div>
                    <div class="info-item"><span class="label"> Страна:</span><span class="value">${info.country}</span></div>
                    ${info.duration ? `<div class="info-item"><span class="label"> Продолжительность:</span><span class="value">${info.duration}</span></div>` : ''}
                    ${info.translation ? `<div class="info-item"><span class="label"> Перевод:</span><span class="value">${info.translation}</span></div>` : ''}
                    ${info.plot ? `<div class="plot"><strong>Описание:</strong><br>${info.plot}</div>` : ''}
                </div>
                <div class="cast-section">
                    <div class="cast-title"> Актёрский состав</div>
                    <div class="cast-grid">${castHtml}</div>
                </div>
            `;
        }

        function renderEpisodes() {
            episodesList.innerHTML = '';
            for (let i = 1; i <= drama.episodes; i++) {
                const btn = document.createElement('button');
                btn.className = 'episode-btn' + (i === currentEpisode ? ' active' : '');
                btn.textContent = `Серия ${i}`;
                btn.dataset.number = i;
                btn.addEventListener('click', () => loadEpisode(i));
                episodesList.appendChild(btn);
            }
        }

        function loadEpisode(number) {
            currentEpisode = number;
            const episode = episodes.find(e => e.number === number);
            currentEpisodeSpan.textContent = `Серия ${number}`;
            episodeTitleSpan.textContent = `— ${episode ? episode.title : ''}`;
            document.querySelectorAll('.episode-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.number) === number);
            });

            const videoUrl = drama.videos[number];
            if (videoUrl) {
                videoPlayer.src = videoUrl;
            }
        }

        function saveLastEpisode(number) {
            try { localStorage.setItem(drama.storageKey, number); } catch(e) {}
        }

        function getLastEpisode() {
            try { return parseInt(localStorage.getItem(drama.storageKey)) || 1; } catch(e) { return 1; }
        }

        renderInfo();
        renderEpisodes();
        loadEpisode(getLastEpisode());

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.episode-btn');
            if (btn) saveLastEpisode(parseInt(btn.dataset.number));
        });

        window.addEventListener('load', () => {
            const saved = getLastEpisode();
            if (saved !== currentEpisode) loadEpisode(saved);
        });

        // =====================================================
        // ===== КОММЕНТАРИИ =====
        // =====================================================
        const COMMENTS_STORAGE_KEY = `comments_${dramaId}`;
        let comments = JSON.parse(localStorage.getItem(COMMENTS_STORAGE_KEY)) || [];

        function renderComments() {
            const container = document.getElementById('commentsList');
            const countSpan = document.getElementById('commentsCount');

            countSpan.textContent = `(${comments.length})`;

            if (comments.length === 0) {
                container.innerHTML = '<div class="no-comments">Пока нет комментариев. Будьте первым! 🎬</div>';
                return;
            }

            let html = '';
            comments.forEach((comment, index) => {
                html += `
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-author">${escapeHtml(comment.name)}</span>
                            <div>
                                <span class="comment-date">${comment.date}</span>
                                <button class="comment-delete" data-index="${index}">✕</button>
                            </div>
                        </div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                    </div>
                `;
            });
            container.innerHTML = html;

            container.querySelectorAll('.comment-delete').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.dataset.index);
                    comments.splice(index, 1);
                    localStorage.setItem(COMMENTS_STORAGE_KEY, JSON.stringify(comments));
                    renderComments();
                });
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('submitComment').addEventListener('click', function() {
            const nameInput = document.getElementById('commentName');
            const textInput = document.getElementById('commentText');
            const name = nameInput.value.trim() || 'Аноним';
            const text = textInput.value.trim();

            if (!text) {
                showToast('Напишите комментарий!', '⚠️', 'error');
                return;
            }

            const now = new Date();
            const date = now.toLocaleDateString('ru-RU') + ' ' + now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            comments.push({ name, text, date });
            localStorage.setItem(COMMENTS_STORAGE_KEY, JSON.stringify(comments));

            textInput.value = '';
            if (nameInput.value.trim() === '') {
                nameInput.value = '';
            }

            renderComments();
            textInput.focus();
            showToast('Комментарий добавлен!', '✅', 'success');
        });

        document.getElementById('commentText').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                document.getElementById('submitComment').click();
            }
        });

        renderComments();
    </script>
