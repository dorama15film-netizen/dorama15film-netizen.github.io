<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смотреть дораму</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0e14; color: #f0f2f5; font-family: system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 16px 30px; background: #0f141c; border-bottom: 1px solid #1f2631; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .header .back-btn { color: #8892a8; text-decoration: none; font-size: 18px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .header .back-btn:hover { color: #f1c40f; }
        .header .title { font-size: 22px; font-weight: 700; color: #f0f2f5; }
        .header .title span { color: #8892a8; font-weight: 400; font-size: 16px; margin-left: 10px; }
        .main-content { flex: 1; padding: 20px 30px 30px; max-width: 1200px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; }
        .player-wrapper { width: 100%; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid #1f2631; position: relative; aspect-ratio: 16 / 9; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; display: block; }
        .episode-info { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 10px; flex-wrap: wrap; gap: 10px; }
        .episode-info .current-episode { font-size: 20px; font-weight: 600; color: #f1c40f; }
        .episode-info .episode-title { color: #8892a8; font-size: 16px; }
        .episodes-list { display: flex; gap: 12px; flex-wrap: wrap; padding: 10px 0 20px; border-bottom: 1px solid #1f2631; margin-bottom: 20px; }
        .episodes-list .episode-btn { background: #151b24; border: 2px solid #2a313f; color: #8892a8; padding: 10px 24px; border-radius: 30px; cursor: pointer; font-size: 15px; font-weight: 600; transition: 0.25s ease; }
        .episodes-list .episode-btn:hover { border-color: #f1c40f; color: #f0f2f5; }
        .episodes-list .episode-btn.active { background: #f1c40f; border-color: #f1c40f; color: #0b0e14; }
        .drama-info { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 10px; }
        .drama-description { color: #8892a8; font-size: 15px; line-height: 1.8; }
        .drama-description .info-item { display: flex; gap: 10px; margin-bottom: 6px; }
        .drama-description .info-item .label { color: #6a7288; min-width: 120px; flex-shrink: 0; }
        .drama-description .info-item .value { color: #f0f2f5; }
        .drama-description .plot { color: #8892a8; font-size: 14px; line-height: 1.8; margin-top: 8px; }
        .drama-description .plot strong { color: #f0f2f5; }
        .cast-section .cast-title { color: #f0f2f5; font-size: 18px; font-weight: 700; margin-bottom: 12px; }
        .cast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .cast-item { background: #151b24; border: 1px solid #1f2631; border-radius: 12px; padding: 12px 16px; }
        .cast-item .actor-name { color: #f0f2f5; font-size: 15px; font-weight: 600; }
        .cast-item .actor-role { color: #8892a8; font-size: 13px; margin-top: 2px; }
        .cast-item .actor-role-tag { background: #1e232c; color: #f1c40f; font-size: 11px; padding: 2px 10px; border-radius: 20px; display: inline-block; margin-top: 4px; }
        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .header .title { font-size: 18px; }
            .main-content { padding: 12px 16px 20px; }
            .drama-info { grid-template-columns: 1fr; gap: 20px; }
            .cast-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .drama-description .info-item .label { min-width: 90px; }
        }
        @media (max-width: 480px) {
            .header .title { font-size: 15px; }
            .header .title span { font-size: 13px; display: block; margin-left: 0; }
            .cast-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .cast-item { padding: 10px 12px; }
            .drama-description .info-item { flex-direction: column; gap: 2px; }
            .drama-description .info-item .label { min-width: auto; }
            .drama-description .plot { font-size: 13px; }
        }
    </style>
</head>

                    translation: 'Профессиональный многоголосый',
                    plot: 'Говорят, море умеет слушать. Не отвечает, не осуждает — просто шумит, перекатывая гальку, и ждёт. Именно к нему и приходят двое, каждый со своим грузом, каждый — на последнем издыхании в той жизни, которую уже не в силах тащить дальше. Юн Док Хён давно перестал ждать чего-то от будущего. Прошлое прилипло к нему, как морская соль к коже — незаметно, намертво, и уже не смыть. Со Ан На когда-то бежала вперёд быстрее всех, но однажды упала — и не просто разбила колено. Разбилась вся жизнь, которую она строила. Теперь тревога стала её постоянным спутником, тихим и удушающим, как туман над водой ранним утром. Они встречаются в маленьком прибрежном посёлке, где время течёт иначе. Без суеты. Без дедлайнов. Здесь рыбаки чинят сети, пахнет водорослями и жареной рыбой, и кажется, что мир снаружи — это просто сон, который никак не хочет заканчиваться. Нырять без снаряжения — странный выбор для людей, которые едва держатся на поверхности. Но именно под водой что-то меняется. Там нет голосов, нет воспоминаний, нет страха перед завтрашним днём. Только холод, темнота и собственное сердцебиение. И — странным образом — покой.',
                    cast: [
                        { name: 'Ким Е-рим', role: 'Со Ан На', tag: 'Главная роль' },
                        { name: 'Кан Сан-джун', role: 'Юн Док Хён', tag: 'Главная роль' },
                        { name: 'Ко Джу-хи', role: 'Второстепенная роль', tag: '' },
                        { name: 'Чон Хён-мин', role: 'Второстепенная роль', tag: '' }
                    ]
                },
                videos: {
                    1: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239023&hash=ed3dfe7f49737604&hd=3',
                    2: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239024&hash=53ba059fa9ecb049&hd=3',
                    3: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239025&hash=65c706e3c5886f24&hd=3',
                    4: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239026&hash=679f21016c9672ec&hd=3',
                    5: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239027&hash=340f22a92d15b7b6&hd=3',
                    6: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239028&hash=77eede5363ac751f&hd=3'
                }
            },
            drama3: {
                name: 'Абсолютная величина любви',
                episodes: 14,
                storageKey: 'lastDramaEpisode3',
                info: {
                    year: '2026',
                    director: 'Тхэ Гон Ли',
                    genre: 'мелодрама, комедия',
                    country: 'Корея Южная',
                    duration: '00:59:00',
                    translation: 'Профессиональный многоголосый',
                    plot: 'Днём — серая мышка за последней партой, та самая ученица, которую учителя путают с соседкой по парте. Ночью — автор бойких веб-романов, где слова льются куда смелее, чем в реальной жизни Е И-джу когда-либо получалось вести себя. Дома — мать с хваткой, не оставляющей пространства для своевольных решений. На бумаге же — свобода без границ. Вдохновением для нового хита становятся четверо молодых учителей, только-только переступивших порог школы: живые, настоящие, с разными голосами и разными взглядами. И вот тонкая грань между вымыслом и явью начинает плавиться, особенно когда в поле зрения попадает загадочный учитель математики — слишком спокойный, слишком наблюдательный, слишком похожий на героя из её собственных текстов. 14 серий нежной неловкости, первых румянцев и того особого корейского обаяния, когда комедия щекочет, а в следующую секунду внезапно сжимает сердце. Где кончается строка романа и начинается настоящее чувство — провести эту черту окажется куда сложнее, чем писать главы по ночам.',
                    cast: [
                        { name: 'Ким Хян-ги', role: 'Е И-джу', tag: 'Главная роль' },
                        { name: 'Ким Джэ-хён', role: 'Ким Джи-сок', tag: 'Главная роль' },
                        { name: 'Чха Хаг-ён', role: 'Чхве Су-мин', tag: '' },
                        { name: 'Сон Джон-хёк', role: 'Ким Дон-гю', tag: '' }
                    ]
                },
                videos: {
                    1: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239029&hash=6c6a19280acdc9b0&hd=3',
                    2: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239030&hash=4664a0649228c5d8&hd=3',
                    3: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239031&hash=8de75c0d4759a3bc&hd=3',
                    4: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239032&hash=7354b81ccd682dc7&hd=3',
                    5: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239033&hash=b9cc2ab205910f58&hd=3',
                    6: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239034&hash=b6fb9a405a540b4f&hd=3',
                    7: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239035&hash=f57658a8a693c6c5&hd=3',
                    8: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239036&hash=20c151fdb24edc00&hd=3',
                    9: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239037&hash=d24dec94eae82be1&hd=3',
                   10: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239038&hash=6ef86bcc48e29c41&hd=3',
                   11: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239039&hash=2e0a9e6fc04ea805&hd=3',
                   12: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239040&hash=0e0d1f9a015c84f2&hd=3',
                   13: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239041&hash=62bef765dc7c52b3&hd=3',
                   14: 'https://vkvideo.ru/video_ext.php?oid=-240209939&id=456239042&hash=2c1c90e731a413de&hd=3'
                }
            },
            drama4: {
                name: 'Атхит - это я',
                episodes: 6,
                storageKey: 'lastDramaEpisode4',
                info: {
                    year: '2022',
                    director: 'Bhandit Thongdee, Simon Kessler',
                    genre: 'комедия, романтика',
                    country: 'Таиланд',
                    duration: '44 мин.',
                    translation: 'Русская озвучка',
                    plot: 'Сан, сборщик долгов с не самой успешной карьерой, оказывается перед серьезным испытанием. Его кредитор устанавливает строгое условие: улучшить свою эффективность и выбить долги в течение месяца, или он будет уволен. Сан, стремясь доказать свою компетентность и сохранить работу, принимает вызов. Решающим заданием для Сана становится взыскание долга в размере десять миллионов с человека по имени Атхит, который живет на отдаленном острове. Однако, это задание оказывается намного сложнее, чем предполагал Сан. Ведь не только удаленность острова ставит его перед препятствиями, но и местные жители, привыкшие к своему спокойному и неприкосновенному образу жизни, не рады его приходу. Со временем, Сан и Атхит вступают в долгую и напряженную войну умов, в ходе которой оба сталкиваются с многочисленными препятствиями и провокациями. В процессе погони за долгом, Сан открывает для себя мир Атхита, его семью, друзей и тайны, которые они скрывают. Встречи с местными жителями и погружение в их быт и культуру позволяют Сану взглянуть на свою жизнь и свои приоритеты с новой точки зрения. В конечном итоге, Сан стоит перед сложным выбором: выполнить свое последнее задание и сохранить работу, но потерять новых друзей и доверие местных жителей, или противостоять кредитору и рискнуть увольнением ради истинных ценностей и дружбы.',
                    cast: [
                        { name: 'Boun Noppanut Guntachai', role: 'Athit', tag: 'Главная роль' },
                        { name: 'Prem Warut Chawalitrujiwong', role: 'Sun', tag: 'Главная роль' }
                    ]
                },
                videos: {
                    1: 'https://ok.ru/videoembed/4203146382027?nochat=1',
                    2: 'https://ok.ru/videoembed/4308622838475?nochat=1',
                    3: '',
                    4: '',
                    5: '',
                    6: ''
                }
            }
        };

        // ===== ОПРЕДЕЛЯЕМ КАКУЮ ДОРАМУ ПОКАЗЫВАТЬ =====
        const urlParams = new URLSearchParams(window.location.search);
        let dramaId = urlParams.get('drama') || 'drama1';

        if (!urlParams.has('drama')) {
            const saved = localStorage.getItem('lastDramaId');
            if (saved && DRAMAS[saved]) {
                dramaId = saved;
            }
        }

        const drama = DRAMAS[dramaId];
        if (!drama) {
            window.location.href = '/';
            throw new Error('Дорама не найдена');
        }

        localStorage.setItem('lastDramaId', dramaId);

        // ===== ЗАГРУЗКА ДОРАМЫ =====
        const episodes = [
            { number: 1, title: '' },
            { number: 2, title: '' },
            { number: 3, title: '' },
            { number: 4, title: '' },
            { number: 5, title: '' },
            { number: 6, title: '' }
        ];

        const episodesList = document.getElementById('episodesList');
        const videoPlayer = document.getElementById('videoPlayer');
        const currentEpisodeSpan = document.getElementById('currentEpisode');
        const episodeTitleSpan = document.getElementById('episodeTitle');
        const dramaTitle = document.getElementById('dramaTitle');
        const dramaEpisodes = document.getElementById('dramaEpisodes');
        const dramaInfoDiv = document.getElementById('dramaInfo');

        let currentEpisode = 1;

        function renderInfo() {
            const info = drama.info;
            dramaTitle.textContent = drama.name;
            dramaEpisodes.textContent = `${drama.episodes} серий`;

            let castHtml = '';
            info.cast.forEach(actor => {
                const tag = actor.tag ? `<span class="actor-role-tag">${actor.tag}</span>` : '';
                castHtml += `
                    <div class="cast-item">
                        <div class="actor-name">${actor.name}</div>
                        <div class="actor-role">${actor.role}</div>
                        ${tag}
                    </div>
                `;
            });

            dramaInfoDiv.innerHTML = `
                <div class="drama-description">
                    <div class="info-item"><span class="label"> Год выпуска:</span><span class="value">${info.year}</span></div>
                    <div class="info-item"><span class="label"> Режиссёр:</span><span class="value">${info.director}</span></div>
                    <div class="info-item"><span class="label"> Жанр:</span><span class="value">${info.genre}</span></div>
                    <div class="info-item"><span class="label"> Страна:</span><span class="value">${info.country}</span></div>
                    ${info.duration ? `<div class="info-item"><span class="label"> Продолжительность:</span><span class="value">${info.duration}</span></div>` : ''}
                    ${info.translation ? `<div class="info-item"><span class="label">🔊 Перевод:</span><span class="value">${info.translation}</span></div>` : ''}
                    ${info.plot ? `<div class="plot"><strong>Описание:</strong><br>${info.plot}</div>` : ''}
                </div>
                <div class="cast-section">
                    <div class="cast-title"> Актёрский состав</div>
                    <div class="cast-grid">${castHtml}</div>
                </div>
            `;
        }

        function renderEpisodes() {
            episodesList.innerHTML = '';
            for (let i = 1; i <= drama.episodes; i++) {
                const btn = document.createElement('button');
                btn.className = 'episode-btn' + (i === currentEpisode ? ' active' : '');
                btn.textContent = `Серия ${i}`;
                btn.dataset.number = i;
                btn.addEventListener('click', () => loadEpisode(i));
                episodesList.appendChild(btn);
            }
        }

        function loadEpisode(number) {
            currentEpisode = number;
            const episode = episodes.find(e => e.number === number);
            currentEpisodeSpan.textContent = `Серия ${number}`;
            episodeTitleSpan.textContent = `— ${episode ? episode.title : ''}`;
            document.querySelectorAll('.episode-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.number) === number);
            });

            const videoUrl = drama.videos[number];
            if (videoUrl) {
                videoPlayer.src = videoUrl;
            }
        }

        function saveLastEpisode(number) {
            try { localStorage.setItem(drama.storageKey, number); } catch(e) {}
        }

        function getLastEpisode() {
            try { return parseInt(localStorage.getItem(drama.storageKey)) || 1; } catch(e) { return 1; }
        }

        renderInfo();
        renderEpisodes();
        loadEpisode(getLastEpisode());

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.episode-btn');
            if (btn) saveLastEpisode(parseInt(btn.dataset.number));
        });

        window.addEventListener('load', () => {
            const saved = getLastEpisode();
            if (saved !== currentEpisode) loadEpisode(saved);
        });
    </script>
</body>
</html>
